<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GrowUp</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfiguracja Tailwind CSS - zmiana kolorystyki -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: {
                            400: '#34d399',
                            500: '#10b981', // Tutaj możesz wkleić docelowy HEX głównego koloru
                            600: '#059669',
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>

    <!-- Phosphor Icons (for cool icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #030712; /* Dark background */
            color: #f3f4f6; /* Light gray text */
            scroll-behavior: smooth;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #22c55e; 
            border-radius: 5px;
        }

        .hero-gradient {
            background: 
                radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.15), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.1), transparent 50%);
        }

        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-glow {
            position: relative;
        }
        .section-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 60%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(34, 197, 94, 0.08), transparent 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .hover-lift {
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-5px);
            border-color: #22c55e;
            box-shadow: 0 10px 30px -10px rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

    // --- KOMPONENTY ---

    const Header = () => {
        const [isScrolled, setIsScrolled] = React.useState(false);

        React.useEffect(() => {
            const handleScroll = () => setIsScrolled(window.scrollY > 50);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        return (
            <header className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-gray-950/90 backdrop-blur-md border-b border-gray-800 py-3' : 'bg-transparent py-6'}`}>
                <nav className="container mx-auto px-6 flex justify-between items-center">
                    <a href="#" className="text-2xl font-black tracking-tighter text-white flex items-center gap-2">
                        {/* Wstawienie docelowego logo. Jeśli plik będzie gotowy, podmień "logo.png" */}
                        <img src="logo.png" alt="Logo" className="h-8 w-auto hidden" onError={(e) => e.target.style.display='none'} />
                        <i className="ph-fill ph-plant text-green-500 text-3xl"></i> 
                        Grow<span className="text-green-500">Up</span>
                    </a>

                    <div className="hidden lg:flex space-x-8 items-center font-medium text-sm">
                        <a href="#o-projekcie" className="text-gray-300 hover:text-green-400 transition-colors">O projekcie</a>
                        <a href="#sciezki" className="text-gray-300 hover:text-green-400 transition-colors">Ścieżki tematyczne</a>
                        <a href="#etapy" className="text-gray-300 hover:text-green-400 transition-colors">Etapy programu</a>
                        <a href="#dla-kogo" className="text-gray-300 hover:text-green-400 transition-colors">Dla kogo</a>
                        <a href="#partnerzy" className="text-gray-300 hover:text-green-400 transition-colors hidden">Partnerzy</a>
                        <a href="#kontakt" className="text-gray-300 hover:text-green-400 transition-colors">Kontakt</a>
                    </div>

                    <a href="#zglos-sie" className="hidden md:inline-block bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-full transition-all transform hover:scale-105 shadow-[0_0_15px_rgba(34,197,94,0.4)]">
                        Chcę wziąć udział
                    </a>
                </nav>
            </header>
        );
    };

    const HeroSection = () => (
        <section className="min-h-screen flex items-center justify-center text-center px-4 pt-20 hero-gradient relative overflow-hidden">
            {/* Decorative elements */}
            <div className="absolute top-1/4 left-10 w-24 h-24 bg-green-500/20 rounded-full blur-3xl animate-pulse"></div>
            <div className="absolute bottom-1/4 right-10 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl animate-pulse delay-1000"></div>

            <div className="max-w-5xl z-10">
                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gray-800/50 border border-gray-700 mb-8 animate-bounce">
                    <span className="w-2 h-2 bg-green-500 rounded-full"></span>
                    <span className="text-xs font-bold uppercase tracking-wider text-gray-300">Tech &bull; Empatia &bull; Sprawczość</span>
                </div>
                
                <h1 className="text-5xl md:text-7xl lg:text-8xl font-black text-white leading-tight mb-6 tracking-tight">
                    Grow IT <span className="text-green-500">Up</span>
                </h1>

                </p>

                <p className="text-lg md:text-xl text-gray-400 max-w-3xl mx-auto mb-12 leading-relaxed">

                </p>

                    </a>
                    <a href="#o-projekcie" className="bg-gray-800 hover:bg-gray-700 text-white text-lg font-bold py-4 px-10 rounded-full transition-transform border border-gray-700">
                        Dowiedz się więcej
                    </a>
                </div>
            </div>

    );

    const AboutSection = () => (

                <div className="max-w-4xl mx-auto items-center mb-24 text-center">
                    <div>

                        </p>
                        <p className="text-gray-300 text-lg mb-6 leading-relaxed">

                        </p>
                        <div className="border-l-4 border-green-500 pl-6 italic text-gray-400 text-left mt-8">
                            "GrowUp powstał właśnie po to — żeby dać Wam przestrzeń do odzyskiwania wpływu i sprawczości."
                        </div>
                    </div>
                </div>

            { title: "Grow Impact", desc: "Opis wkrótce... [Tutaj dodaj opis]" },

                                <h3 className="text-xl font-bold text-white">{step.title}</h3>
                            </div>

                    </div>

    const BenefitsSection = () => (
        <section className="py-24 px-4 relative overflow-hidden">
             <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5 pointer-events-none"></div>
            <div className="container mx-auto max-w-6xl relative z-10">

                        <h2 className="text-4xl font-bold mb-8">Co <span className="text-green-500">zyskasz?</span></h2>
                        <ul className="space-y-4">

                                { bold: "Wsparcie mentorów", text: "— technologicznych i biznesowych" },
                                { bold: "Praktyczne kompetencje", text: "(tech, współpraca, zarządzanie)" },

                                { bold: "Umiejętności", text: "przyszłości" }

                                <li key={i} className="flex items-start gap-3">

                                </div>

                                    <i className="ph-bold ph-stairs text-2xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-white">Program rozwojowy</h4>
                                    <p className="text-sm text-gray-400">Wsparcie specjalistów w dopracowaniu projektu.</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">

                                    <i className="ph-bold ph-briefcase text-2xl"></i>
                                </div>

                                    <p className="text-sm text-gray-400">W firmach partnerskich i zawodach przyszłości.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

    const TargetGroupSection = () => (

    const JoinSection = () => (
        <section id="zglos-sie" className="py-24 px-4 text-center">
             <div className="container mx-auto max-w-3xl">
                <h2 className="text-5xl font-black mb-6 text-white">WEŹ UDZIAŁ</h2>
                <p className="text-xl text-gray-400 mb-12">Nie czekaj. Dorosłość sama się nie zaprojektuje.</p>
                
                <div className="flex flex-col sm:flex-row gap-6 justify-center">

                    </p>
                    <p className="text-sm">
